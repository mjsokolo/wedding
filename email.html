<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Invite</title>
    <style>
      @media only screen and (max-width: 600px) {
        .shell {
          padding: 20px 12px !important;
        }
        .card-body {
          padding: 28px 20px !important;
        }
        .title {
          font-size: 34px !important;
        }
        .date-line {
          font-size: 14px !important;
        }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background:#ebe6d7;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#ebe6d7;">
      <tr>
        <td align="center" class="shell" style="padding:28px 14px;">
          <table role="presentation" cellpadding="0" cellspacing="0" width="520" style="max-width:520px;width:100%;background:#f5f1e6;border-radius:24px;overflow:hidden;box-shadow:0 12px 30px rgba(44,53,35,0.2);font-family:'Georgia','Times New Roman',serif;color:#2d2520;">
            <tr>
              <td class="card-body" style="padding:34px 28px;text-align:center;">
                <div style="font-family:Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#5e6855;">Save the Date</div>
                <h1 class="title" style="margin:12px 0 8px;font-size:40px;line-height:1.1;">Lilly &amp; Michael</h1>
                <div class="date-line" style="font-family:Arial,sans-serif;font-size:16px;color:#5e6855;">August 22, 2026 • Shelburne Falls, MA</div>
                <div style="margin:24px 0;">
                  <a href="https://mjsokolo.github.io/wedding/" style="display:inline-block;background:#4b5f41;color:#f7f3e8;text-decoration:none;padding:12px 28px;border-radius:999px;font-family:Arial,sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;">RSVP</a>
                </div>
                <div style="margin-top:18px;font-family:Arial,sans-serif;font-size:13px;color:#5e6855;">More details on the website.</div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
